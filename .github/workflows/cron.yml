name: Daily Broadcast Cron

on:
  schedule:
    # 7:00 AM IST (UTC 01:30)
    - cron: '30 1 * * *'
    # 7:00 PM IST (UTC 13:30)
    - cron: '30 13 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  ping_broadcast_endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Broadcast
        run: |
          curl -f -X GET "${{ secrets.PROD_URL }}/api/cron/broadcast" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
