name: Scrape Jobs Daily

on:
  schedule:
    # Run daily at 03:00 UTC (08:30 AM IST) so notifications arrive by 9:00 AM IST
    - cron: '0 3 * * *'
  # Allow manual trigger from the GitHub UI
  workflow_dispatch:

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Job Scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          npx tsx scripts/run-scraper.ts

      - name: Trigger Errand Boy (Nudges)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Warning: CRON_SECRET is not set. Skipping Errand Boy."
            exit 0
          fi
          echo "Triggering Errand Boy at https://www.proxnet.in/api/admin/nudges"
          curl -X POST https://www.proxnet.in/api/admin/nudges \
               -H "Authorization: Bearer $CRON_SECRET" \
               -w "\nHTTP Status: %{http_code}\n"
